name: Publish GHCR Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/florex-ui-docs:latest
            ghcr.io/${{ github.repository_owner }}/florex-ui-docs:${{ github.sha }}
      - name: Trigger Dokploy deploy
        if: ${{ env.DOKPLOY_API_URL != '' }}
        run: |
          curl --retry 3 --retry-delay 2 --fail --show-error --silent \
            -X POST "$DOKPLOY_API_URL" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "{\"applicationId\":\"$DOKPLOY_APPLICATION_ID\"}"
